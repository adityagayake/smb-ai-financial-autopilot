# Rename `app` to a globally unique Fly app name, or run `fly launch` from backend/
app = "smb-financial-api"
primary_region = "bom"

[build]

[deploy]
  release_command = "prisma db push --schema prisma/schema.prisma"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  # Keep one machine warm so cold starts + Prisma connect do not race the proxy.
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "10s"
    grace_period = "90s"
    method = "GET"
    path = "/health"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
