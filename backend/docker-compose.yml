# Local PostgreSQL for Prisma (development)
# From backend/: docker compose up -d
# Then: export DATABASE_URL=postgresql://smb:smb@localhost:5432/smb_ai
#       PATH=".venv/bin:$PATH" prisma db push

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - smb_redis_data:/data

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: smb
      POSTGRES_PASSWORD: smb
      POSTGRES_DB: smb_ai
    ports:
      - "5432:5432"
    volumes:
      - smb_pg_data:/var/lib/postgresql/data

volumes:
  smb_redis_data:
  smb_pg_data:
